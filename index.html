<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Typing Speed Game</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <div class="game-container">
      <header>
        <h1>Typing Speed Test Game</h1>
      </header>

      <main>
        <h2 class="info">
          You are playing on {<span class="level">Normal</span>} level and you
          have {<span class="seconds">4</span>} seconds to type the word
        </h2>

        <div class="choose-level">
          <label for="level">Choose Level:</label>
          <select name="levels" id="level">
            <option value="Easy">Easy</option>
            <option value="Normal" selected>Normal</option>
            <option value="Hard">Hard</option>
          </select>
        </div>

        <div class="choose-lang">
          <label for="lang">Choose Language:</label>
          <select name="languages" id="lang">
            <option value="english" selected>English</option>
            <option value="arabic">Arabic</option>
          </select>
        </div>

        <button class="start-game" type="button">Start The Game</button>

        <div class="show-word hide"></div>
        <div class="result hide"></div>

        <div class="type hide">
          <input type="text" aria-label="Word input" autocomplete="off" />
        </div>

        <ul class="words hide"></ul>

        <div class="timer-score">
          <div class="timer">Timer Left: <span>4</span> Seconds</div>
          <div class="score">
            Score: <span class="typed-words">0</span> From
            <span class="total-words"></span>
          </div>
        </div>

        <button class="try-again hide" type="button">Try Again</button>
      </main>
    </div>
  </body>
</html>
